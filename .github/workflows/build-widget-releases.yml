name: Build widget releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build widget releases
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Build, package, and publish widgets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for WIDGET in $(./scripts/widget_metadata.py list); do
            echo "::group::Build $WIDGET"
            ./scripts/build-widget.sh "$WIDGET"
            echo "::endgroup::"

            echo "::group::Package $WIDGET"
            ./scripts/package-widget.sh "$WIDGET"
            echo "::endgroup::"

            TAG="$(./scripts/widget_metadata.py field "$WIDGET" releaseTag)"
            TITLE="$(./scripts/widget_metadata.py field "$WIDGET" releaseTitle)"
            NOTES="$(./scripts/widget_metadata.py field "$WIDGET" changelog)"
            ARTIFACT="$(./scripts/widget_metadata.py field "$WIDGET" artifact)"
            ASSET="dist/$ARTIFACT.pkarchive"

            echo "::group::Publish $TAG"
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" "$ASSET" --clobber
            else
              gh release create "$TAG" "$ASSET" --target "$GITHUB_SHA" --title "$TITLE" --notes "$NOTES"
            fi
            echo "::endgroup::"
          done
